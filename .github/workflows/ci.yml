name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: [self-hosted, linux, x64, vesana-vps]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: community
          POSTGRES_PASSWORD: community
          POSTGRES_DB: community
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U community -d community"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_TEST: postgresql+psycopg://community:community@localhost:5432/community

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: pytest
        run: pytest -q
