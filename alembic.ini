# Alembic configuration for vesana-community.
#
# The database URL is intentionally NOT set here; migrations/env.py reads it
# from the DATABASE_URL environment variable so we never commit credentials.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use os.pathsep-separated paths; "." keeps the app importable from env.py.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
